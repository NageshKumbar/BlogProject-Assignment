{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow">
    <h3>Create Blog</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Title</label>
            <input type="text" name="title" class="form-control">
        </div>

        <div class="mb-3">
            <label>Content</label>
            <textarea name="content" class="form-control" rows="5"></textarea>
        </div>

        <button class="btn btn-custom">Submit</button>
    </form>
</div>

{% endblock %}
